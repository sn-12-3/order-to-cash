version: '3.8'

services:
  ibmmq:
    image: icr.io/ibm-messaging/mq:latest
    platform: linux/amd64
    container_name: o2c-ibmmq
    ports:
      - "1414:1414"
      - "9443:9443"
    environment:
      - LICENSE=accept
      - MQ_QMGR_NAME=QM1
      - MQ_APP_PASSWORD=passw0rd
      - MQ_ADMIN_PASSWORD=passw0rd
      - MQ_ENABLE_EMBEDDED_WEB_SERVER=true
    volumes:
      - ibmmq-data:/mnt/mqm
    networks:
      - o2c-network
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "-u", "admin:passw0rd", "https://localhost:9443/ibmmq/rest/v2/admin/qmgr/QM1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    platform: linux/amd64
    container_name: o2c-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - o2c-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    platform: linux/amd64
    container_name: o2c-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - o2c-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  o2c-integration-app:
    build: .
    platform: linux/amd64
    container_name: o2c-integration-app
    depends_on:
      ibmmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - MQ_HOST=ibmmq
      - MQ_PORT=1414
      - MQ_CHANNEL=DEV.APP.SVRCONN
      - MQ_QUEUE_MANAGER=QM1
      - MQ_QUEUE_NAME=CUSTOMER_PURCHASE_ORDERS
      - MQ_USER=app
      - MQ_PASSWORD=passw0rd
      - SAP_BASE_URL=http://host.docker.internal:3001
      - SAP_SALES_ORDER_ENDPOINT=/sap/api/sales-order
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=o2c-integration
      - KAFKA_SUCCESS_TOPIC=submitted_orders
      - KAFKA_FAILED_TOPIC=failed_orders
      - POLL_INTERVAL_MS=5000
      - MAX_RETRIES=3
      - RETRY_DELAY_MS=2000
      - LOG_LEVEL=info
    networks:
      - o2c-network
    restart: unless-stopped

volumes:
  ibmmq-data:

networks:
  o2c-network:
    driver: bridge

